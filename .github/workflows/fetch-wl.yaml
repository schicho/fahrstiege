name: Fetch the escalator information from Wiener Linien API

on:
    schedule:
        - cron: "15 6,9,12,15,18,21 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    fetch-wl:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.10"

            - run: python3 download.py

            - run: python3 update_counter.py

            - name: Commit json to the repo
              run: |
                  git config --global user.name github-actions
                  git config --global user.email github-actions[bot]@users.noreply.github.com
                  git add .
                  git commit -m "Update WL live data" || true
                  git push
